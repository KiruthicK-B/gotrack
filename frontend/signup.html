<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrack - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .btn, .user-btn {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .btn:hover, .user-btn:hover {
            background-color: #0056b3;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h3><img src="logo.jpg" alt="GoTrack"></h3>
        <ul>
            <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="booking.html"><i class="fas fa-bus"></i> Book Bus</a></li>
            <li><i class="fas fa-map"></i> Track Bus</li>
            <li><a href="Search.html"><i class="fas fa-bus"></i> Search Bus</a></li>            
            <li><a href="signin.html"><i class="fas fa-user"></i> Sign Up / Sign In</a></li>
        </ul>
    </div>

    <!-- Signup Form -->
    <div class="main-content">
        <div class="auth-container">
            <h2>Sign Up</h2>

            <div class="form-group">
                <label>Select User Type:</label>
                <button class="user-btn" onclick="showForm('conductor')">Conductor</button>
                <button class="user-btn" onclick="showForm('passenger')">Passenger</button>
            </div>

            <!-- Conductor Signup Form -->
            <form id="conductor-form" class="hidden" method="POST" action="signup.php">
                <h3>Conductor Signup</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="conductor_name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" id="conductor_phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>Employee ID</label>
                    <input type="text" class="form-control" id="conductor_employee_id" placeholder="Enter your Employee ID" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="conductor_password" placeholder="Enter your password" required>
                </div>
                <button class="btn" type="submit">Sign Up</button>
            </form>

            <!-- Passenger Signup Form -->
            <form id="passenger-form" class="hidden" method="POST" action="signup.php">
                <h3>Passenger Signup</h3>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" id="passenger_name" placeholder="Enter your name" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" class="form-control" id="passenger_phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" id="passenger_password" placeholder="Enter your password" required>
                </div>
                <button class="btn" type="submit">Sign Up</button>
            </form>
        </div>
    </div>

    <script>
        function showForm(userType) {
            document.getElementById("conductor-form").classList.add("hidden");
            document.getElementById("passenger-form").classList.add("hidden");

            if (userType === 'conductor') {
                document.getElementById("conductor-form").classList.remove("hidden");
            } else {
                document.getElementById("passenger-form").classList.remove("hidden");
            }
        }

        // Handle Conductor Signup
        document.getElementById("conductor-form").addEventListener("submit", function(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append("user_type", "conductor");
            formData.append("full_name", document.getElementById("conductor_name").value);
            formData.append("phone", document.getElementById("conductor_phone").value);
            formData.append("employee_id", document.getElementById("conductor_employee_id").value);
            formData.append("password", document.getElementById("conductor_password").value);

            sendData(formData);
        });

        // Handle Passenger Signup
        document.getElementById("passenger-form").addEventListener("submit", function(event) {
            event.preventDefault();

            const formData = new FormData();
            formData.append("user_type", "passenger");
            formData.append("full_name", document.getElementById("passenger_name").value);
            formData.append("phone", document.getElementById("passenger_phone").value);
            formData.append("password", document.getElementById("passenger_password").value);

            sendData(formData);
        });

        // Send Data to PHP
        function sendData(formData) {
    fetch("signup.php", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        alert(data.message);
        if (data.status === "success") {
            window.location.href = "signin.html";  // Redirect to signin page
        }
    })
    .catch(error => console.error("Error:", error));
}

    </script>

</body>
</html>
