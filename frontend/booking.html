    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;

        }

        .form-container {

        label {
            display: block;

        }

        select, input {
            padding: 8px;

        }

        button {
    background: #ff7700;
   
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            border-radius: 5px;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .bus-list {
            margin-top: 20px;
            background: white;

    </style>
</head>
<body>
    <div class="sidebar">
        <h3><img src="logo.jpg" alt="GoTrack"></h3>
        <ul>
            <li><a href="index.php"><i class="fas fa-home"></i> Home</a></li>
            <li><a href="#"><i class="fas fa-bus"></i> Book Bus</a></li>
            <li><a href="map.php"><i class="fas fa-map"></i> Track Bus</a></li>
            <li><a href="Search.html"><i class="fas fa-bus"></i> Search Bus</a></li>            
            <li><a href="signin.html"><i class="fas fa-user"></i> Sign Up / Sign In</a></li>
        </ul>
    </div>
    <h1>Bus Ticket Booking</h1>

    <div class="form-container">
        <label for="fromLocation">From:</label>
        <select id="fromLocation"></select>

        <label for="toLocation">To:</label>
        <select id="toLocation"></select>

        <button onclick="showBuses()">Show Buses</button>
    </div>

    <div class="bus-list" id="busList" style="display: none;">
        <h2>Available Buses</h2>
        <div id="busesContainer"></div>
    </div>

    <script>
        // Tamil Nadu Districts
        const tamilNaduDistricts = [
            "Ariyalur", "Chengalpattu", "Chennai", "Coimbatore", "Cuddalore", 
            "Dharmapuri", "Dindigul", "Erode", "Kallakurichi", "Kanchipuram", 
            "Kanyakumari", "Karur", "Krishnagiri", "Madurai", "Nagapattinam", 
            "Namakkal", "Nilgiris", "Perambalur", "Pudukkottai", "Ramanathapuram", 
            "Ranipet", "Salem", "Sivaganga", "Tenkasi", "Thanjavur", "Theni", 
            "Thoothukudi", "Tiruchirappalli", "Tirunelveli", "Tirupattur", 
            "Tiruppur", "Tiruvallur", "Tiruvannamalai", "Tiruvarur", 
            "Vellore", "Viluppuram", "Virudhunagar"
        ];

        function populateDropdown(id) {
            const dropdown = document.getElementById(id);
            dropdown.innerHTML = '<option value="">Select Location</option>';
            tamilNaduDistricts.forEach(district => {
                let option = document.createElement("option");
                option.value = district;
                option.textContent = district;
                dropdown.appendChild(option);
            });
        }

        function showBuses() {
            const from = document.getElementById('fromLocation').value;
            const to = document.getElementById('toLocation').value;
            const busList = document.getElementById('busList');
            const busesContainer = document.getElementById('busesContainer');

            if (!from || !to) {
                alert("Please select both 'From' and 'To' locations.");
                return;
            }

            // Example Bus Data
            const buses = [
                { id: 1, name: "TNSTC Express", seats: 40, time: "10:00 AM" },
                { id: 2, name: "KPN Travels", seats: 30, time: "2:00 PM" },
                { id: 3, name: "Parveen Travels", seats: 25, time: "6:00 PM" }
            ];

            busesContainer.innerHTML = '';
            buses.forEach(bus => {
                let busItem = document.createElement('div');
                busItem.classList.add('bus-item');
                busItem.innerHTML = `
                    <span><strong>${bus.name}</strong> - ${bus.time}</span>
                    <button class="book-btn" onclick="bookBus(${bus.id}, '${from}', '${to}')">Book</button>
                `;
                busesContainer.appendChild(busItem);
            });

            busList.style.display = "block";
        }

        function bookBus(busId, from, to) {
    window.location.href = `seat_selection.html?id=${busId}&from=${from}&to=${to}`;
}


        // Load dropdowns on page load
        window.onload = () => {
            populateDropdown("fromLocation");
            populateDropdown("toLocation");
        };
    </script>

</body>
</html>
