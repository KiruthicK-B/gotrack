<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTrack - Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        
        .auth-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 400px;
        }
        .form-group {
            width: 100%;
            margin-bottom: 15px;
            text-align: left;
        }
        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3><img src="logo.jpg" alt="GoTrack"></h3>
        <ul>
            <li><a href="index.php"><i class="fas fa-home"></i> Home</a></li>
            
            <li><a href="map.php"><i class="fas fa-map"></i> Track Bus</a></li>
            <li><a href="search.php"><i class="fas fa-bus"></i> Search Bus</a></li>            
            <li><a href="#"><i class="fas fa-user"></i> Sign Up / Sign In</a></li>
        </ul>
    </div>
    <div class="auth-container">
        <h2>Sign In</h2>
        <form id="loginForm" method="POST">
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number" pattern="[0-9]{10}" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function(event) {
            event.preventDefault();
            
            const formData = new FormData();
            formData.append("phone", document.getElementById("phone").value);
            formData.append("password", document.getElementById("password").value);

            fetch("signin.php", {
    method: "POST",
    body: formData
})
.then(response => response.text()) // Change to text() to inspect response
.then(data => {
    console.log("Raw Response:", data); // Debugging step
    return JSON.parse(data); // Convert to JSON manually
})
.then(jsonData => {
    alert(jsonData.message);
    if (jsonData.status === "success") {
        window.location.href = "index.php";
    }
})
.catch(error => console.error("Error:", error));

        });
    </script>

</body>
</html>
